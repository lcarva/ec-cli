apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: release-cli
spec:
  description: Tekton pipeline to release Snapshots to a registry.
  params:
  # TODO: Use the real repos here.
  - default: quay.io/lucarval/test-release-ec-cli
    description: Location to push the CLI image to
    name: cli-repo
    type: string
  - default: quay.io/lucarval/test-release-ec-bundle
    description: Location to push the bundle image to
    name: bundle-repo
    type: string
  - description: The namespaced name (namespace/name) of the snapshot
    name: snapshot
    type: string
  - default: ""
    # TODO: Do we care about this? It mostly enables weekday restrictions.
    # default: pipeline_intention=release
    description: |
      Extra rule data to be merged into the policy specified in params.enterpriseContractPolicy. Use syntax
      "key1=value1,key2=value2..."
    name: enterpriseContractExtraRuleData
    type: string
  tasks:
  # TODO: Can't use Konflux's git-clone Task because that requires a security context not provided
  # to the ServiceAccount running this pipeline (securityContext.runAsUser: 0).
  - name: clone-repository
    params:
    # TODO: Use the repo and revision here.
    - name: url
      value: https://github.com/lcarva/ec-cli
    - name: revision
      value: unified-build-release
    - name: subdirectory
      value: source
    taskRef:
      params:
      - name: url
        value: https://github.com/lcarva/build-definitions.git
      - name: revision
        value: no-root-git-clone
      - name: pathInRepo
        value: task/git-clone/0.1/git-clone.yaml
      resolver: git
      # params:
      # - name: name
      #   value: git-clone
      # - name: bundle
      #   value: quay.io/konflux-ci/tekton-catalog/task-git-clone:0.1@sha256:d091a9e19567a4cbdc5acd57903c71ba71dc51d749a4ba7477e689608851e981
      # - name: kind
      #   value: task
      # resolver: bundles
    workspaces:
    - name: output
      workspace: release-workspace
  # - name: clone-repository
  #   params:
  #   # TODO: Use the repo and revision here.
  #   - name: url
  #     value: https://github.com/lcarva/ec-cli
  #   - name: revision
  #     value: unified-build-release
  #   taskRef:
  #     name: git-clone-1-9-0
  #     kind: ClusterTask
  #   workspaces:
  #   - name: output
  #     workspace: release-workspace
  - name: expand-snapshot
    params:
    - name: input
      value: $(params.snapshot)
    runAfter:
    - clone-repository
    taskSpec:
      params:
      - name: input
        type: string
      results:
      - name: cli-snapshot-spec
        type: string
      - name: bundle-snapshot-spec
        type: string
      stepTemplate:
        env:
          - name: HOME
            value: /tekton/home
      steps:
      - command:
        - hack/expand-snapshot.sh
        - $(params.input)
        - $(results.cli-snapshot-spec.path)
        - $(results.bundle-snapshot-spec.path)
        image: quay.io/konflux-ci/appstudio-utils:latest
        name: expand
        workingDir: $(workspaces.source.path)/source
      workspaces:
      - name: source
    workspaces:
    - name: source
      workspace: release-workspace
  - name: verify-enterprise-contract-cli
    params:
    - name: IMAGES
      value: $(tasks.expand-snapshot.results.cli-snapshot-spec)
    - name: SSL_CERT_DIR
      value: /var/run/secrets/kubernetes.io/serviceaccount
    - name: POLICY_CONFIGURATION
      value: $(workspaces.data.path)/source/policies/cli/policy.yaml
    - name: IGNORE_REKOR
      value: "true"
    - name: EXTRA_RULE_DATA
      value: $(params.enterpriseContractExtraRuleData)
    taskRef:
      params:
      - name: bundle
        value: quay.io/enterprise-contract/ec-task-bundle:snapshot
      - name: kind
        value: task
      - name: name
        value: verify-enterprise-contract
      resolver: bundles
    workspaces:
    - name: data
      workspace: release-workspace
  # TODO: Use matrix?
  - name: verify-enterprise-contract-bundle
    params:
    - name: IMAGES
      value: $(tasks.expand-snapshot.results.bundle-snapshot-spec)
    - name: SSL_CERT_DIR
      value: /var/run/secrets/kubernetes.io/serviceaccount
    - name: POLICY_CONFIGURATION
      value: $(workspaces.data.path)/source/policies/tekton-task/policy.yaml
    - name: IGNORE_REKOR
      value: "true"
    - name: EXTRA_RULE_DATA
      value: $(params.enterpriseContractExtraRuleData)
    taskRef:
      params:
      - name: bundle
        value: quay.io/enterprise-contract/ec-task-bundle:snapshot
      - name: kind
        value: task
      - name: name
        value: verify-enterprise-contract
      resolver: bundles
    workspaces:
    - name: data
      workspace: release-workspace
  - name: release-cli
    params:
    - name: snapshot-spec
      value: $(tasks.expand-snapshot.results.cli-snapshot-spec)
    - name: target-repo
      value: $(params.cli-repo)
    runAfter:
    - verify-enterprise-contract-cli
    - verify-enterprise-contract-bundle
    taskSpec:
      params:
      - name: snapshot-spec
        type: string
      - name: target-repo
        type: string
      stepTemplate:
        env:
          - name: HOME
            value: /tekton/home
      steps:
      - command:
        - hack/copy-snapshot-image.sh
        - $(params.snapshot-spec)
        - $(params.target-repo)
        image: quay.io/konflux-ci/appstudio-utils:latest
        name: copy
        workingDir: $(workspaces.source.path)/source
      workspaces:
      - name: source
    workspaces:
    - name: source
      workspace: release-workspace
  # TODO: Use matrix?
  - name: release-bundle
    params:
    - name: snapshot-spec
      value: $(tasks.expand-snapshot.results.bundle-snapshot-spec)
    - name: target-repo
      value: $(params.bundle-repo)
    runAfter:
    - verify-enterprise-contract-cli
    - verify-enterprise-contract-bundle
    taskSpec:
      params:
      - name: snapshot-spec
        type: string
      - name: target-repo
        type: string
      stepTemplate:
        env:
          - name: HOME
            value: /tekton/home
      steps:
      - command:
        - hack/copy-snapshot-image.sh
        - $(params.snapshot-spec)
        - $(params.target-repo)
        image: quay.io/konflux-ci/appstudio-utils:latest
        name: copy
        workingDir: $(workspaces.source.path)/source
      workspaces:
      - name: source
    workspaces:
    - name: source
      workspace: release-workspace
  workspaces:
  - name: release-workspace
